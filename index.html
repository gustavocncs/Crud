<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lista de Contatos</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <section class="card">
        <div class="header">
          <h1>Lista de Contatos</h1>
        </div>

        <div class="search-box">
          <label for="search"><strong>Buscar:</strong></label>
          <input
            type="text"
            id="search"
            placeholder="Buscar por nome ou e-mail"
          />
        </div>

        <form id="form" class="form">
          <div class="input-group">
            <label for="nome">Nome:</label>
            <input type="text" id="nome" placeholder="Digite o nome" required />
          </div>

          <div class="input-group">
            <label for="email">E-mail:</label>
            <input
              type="email"
              id="email"
              placeholder="Digite o e-mail"
              required
            />
          </div>

          <div class="form-actions">
            <button type="submit" class="save-btn" id="save-btn">Salvar contato</button>
            <button type="button" class="cancel-btn" id="cancel-btn" style="display:none">Cancelar</button>
          </div>
        </form>

        <div class="list-header">
          <h2>Lista de contatos</h2>
          <span class="count" id="count"></span>
        </div>

        <ul id="lista" class="contact-list"></ul>

        <div class="empty-state" id="empty-state" style="display:none">
          <p>Nenhum contato encontrado.</p>
        </div>
      </section>
    </main>

    <div class="modal-overlay" id="modal" style="display:none">
      <div class="modal">
        <p>Deseja excluir este contato?</p>
        <div class="modal-actions">
          <button id="modal-confirm" class="danger-btn">Excluir</button>
          <button id="modal-cancel" class="cancel-btn">Cancelar</button>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
